<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Snake Pastel - Perfect Mobile Edition</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            background-color: #f7f3eb;
            font-family: 'Segoe UI', Roboto, Helvetica, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 12px;
            touch-action: manipulation;
        }

        #main-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 380px; 
        }

        /* Bingkai Layar Game */
        #window-frame {
            width: 100%;
            background: #ffffff;
            border-radius: 16px 16px 12px 12px;
            box-shadow: 0 10px 30px rgba(93, 87, 107, 0.05);
            overflow: hidden;
            border: 1px solid rgba(0,0,0,0.02);
            margin-bottom: 12px;
        }

        .window-header {
            background: #ffffff;
            height: 24px;
            display: flex;
            align-items: center;
            padding-left: 12px;
            gap: 6px;
            border-bottom: 1px solid #faf8f5;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }
        .dot-red { background: #ff5f56; }
        .dot-yellow { background: #ffbd2e; }
        .dot-green { background: #27c93f; }

        /* Area Canvas Game (Rasio Lebar 16:10) */
        #game-box {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 10; 
            background: #faf7f2;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Overlay Layar Start / Game Over */
        #overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(250, 247, 242, 0.92);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        #overlay.hidden { display: none; }

        #overlay h2 {
            font-size: 22px;
            color: #5d576b;
            margin-bottom: 12px;
            font-weight: 600;
        }

        #start-btn {
            padding: 8px 24px;
            font-size: 14px;
            font-weight: 600;
            background: #ffd2d7;
            color: #7d4f52;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(255, 210, 215, 0.4);
        }

        /* PANEL BAWAH BARU - Responsif & Fleksibel */
        #bottom-panel {
            width: 100%;
            background: #eae2d5; 
            padding: 12px;
            border-radius: 24px;
            display: flex;
            flex-direction: column; /* Default bertumpuk vertikal di HP agar lega */
            gap: 10px;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.01);
        }

        /* Baris Data (Warna + Skor) */
        .panel-row-top {
            display: flex;
            justify-content: space-between;
            width: 100%;
            gap: 10px;
        }

        .panel-card {
            background: #ffffff;
            border-radius: 16px;
            padding: 10px 12px;
            height: 65px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            flex: 1; /* Membagi ukuran rata kanan-kiri */
            box-shadow: 0 4px 10px rgba(0,0,0,0.01);
        }

        /* Sisi Kiri: Warna Ular */
        .color-section {
            align-items: center;
            gap: 4px;
        }
        .color-section label {
            font-size: 10px;
            font-weight: 700;
            color: #7c7569;
            letter-spacing: 0.5px;
        }
        .picker-container {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        input[type="color"] {
            -webkit-appearance: none;
            border: none;
            width: 24px;
            height: 24px;
            border-radius: 6px;
            cursor: pointer;
            background: none;
        }
        input[type="color"]::-webkit-color-swatch {
            border: 1.5px solid #eae2d5;
            border-radius: 6px;
        }
        .rainbow-bar {
            width: 40px;
            height: 12px;
            border-radius: 4px;
            background: linear-gradient(to right, red, orange, yellow, green, blue, purple);
            opacity: 0.7;
        }

        /* Sisi Kanan: Skor */
        .score-section {
            font-size: 11px;
            font-weight: 700;
            color: #635c51;
            align-items: flex-start;
            padding-left: 15px;
            line-height: 1.5;
        }
        .score-section span {
            font-weight: 800;
            color: #a3957e;
        }

        /* Baris Kontrol D-Pad */
        .panel-row-bottom {
            display: flex;
            justify-content: center;
            width: 100%;
            padding: 4px 0;
        }

        .dpad-center {
            display: grid;
            grid-template-columns: repeat(3, 32px);
            grid-template-rows: repeat(3, 32px);
            gap: 6px;
        }

        .dbtn {
            background: #ffffff;
            border: none;
            border-radius: 50%;
            color: #8d869d;
            font-size: 14px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 3px 6px rgba(0,0,0,0.05);
            transition: background 0.1s;
        }
        .dbtn:active {
            background: #ebdcd0;
        }

        #btn-up { grid-column: 2; grid-row: 1; }
        #btn-left { grid-column: 1; grid-row: 2; }
        #btn-right { grid-column: 3; grid-row: 2; }
        #btn-down { grid-column: 2; grid-row: 3; }

        .brand-footer {
            align-self: flex-end;
            margin-top: 8px;
            font-size: 11px;
            color: #b5ad9e;
            font-weight: 600;
        }
        .brand-footer span { color: #ffb5a7; }

        /* DEKSTOP/LAPTOP OPTIMIZATION: Berubah jadi 3 kolom horizontal jika layar lebar */
        @media (min-width: 480px) {
            #bottom-panel {
                flex-direction: row;
                align-items: center;
            }
            .panel-row-top {
                flex: 2;
                gap: 10px;
            }
            .panel-row-bottom {
                flex: 1;
                justify-content: center;
            }
            .dpad-center {
                grid-template-columns: repeat(3, 26px);
                grid-template-rows: repeat(3, 26px);
                gap: 4px;
            }
            .dbtn { font-size: 11px; }
            .panel-card { height: 75px; }
        }
    </style>
</head>
<body>

    <div id="main-container">
        
        <div id="window-frame">
            <div class="window-header">
                <div class="dot dot-red"></div>
                <div class="dot dot-yellow"></div>
                <div class="dot dot-green"></div>
            </div>
            <div id="game-box">
                <canvas id="gameCanvas" width="480" height="300"></canvas>
                <div id="overlay">
                    <h2 id="overlay-title">Mulai Permainan</h2>
                    <button id="start-btn">MAIN</button>
                </div>
            </div>
        </div>

        <div id="bottom-panel">
            
            <div class="panel-row-top">
                <div class="panel-card color-section">
                    <label>WARNA ULAR</label>
                    <div class="picker-container">
                        <input type="color" id="snakeColor" value="#fbc4cb">
                        <div class="rainbow-bar"></div>
                    </div>
                </div>

                <div class="panel-card score-section">
                    <div>SKOR: <span id="score">0</span></div>
                    <div>TERTINGGI: <span id="high-score">0</span></div>
                </div>
            </div>

            <div class="panel-row-bottom">
                <div class="dpad-center">
                    <button class="dbtn" id="btn-up">▲</button>
                    <button class="dbtn" id="btn-left">◀</button>
                    <button class="dbtn" id="btn-right">▶</button>
                    <button class="dbtn" id="btn-down">▼</button>
                </div>
            </div>

        </div>

        <div class="brand-footer">🪱 <span>els</span>snake.</div>

    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");
        const highScoreElement = document.getElementById("high-score");
        const colorPicker = document.getElementById("snakeColor");
        const overlay = document.getElementById("overlay");
        const overlayTitle = document.getElementById("overlay-title");
        const startBtn = document.getElementById("start-btn");

        const gridSize = 15; 
        let snake = [];
        let food = { x: 0, y: 0 };
        let dx = gridSize;
        let dy = 0;
        let score = 0;
        let highScore = localStorage.getItem("fixedSnakeHighScore") || 0;
        let gameInterval;
        let gameRunning = false;
        let snakeColor = colorPicker.value;

        highScoreElement.innerText = highScore;

        colorPicker.addEventListener("input", (e) => {
            snakeColor = e.target.value;
            if(!gameRunning) draw();
        });

        // Kontrol Keyboard Laptop
        document.addEventListener("keydown", (e) => {
            if (!gameRunning) return;
            if (e.key === "ArrowLeft" || e.key === "a" || e.key === "A") triggerDirection(-gridSize, 0);
            if (e.key === "ArrowUp" || e.key === "w" || e.key === "W") triggerDirection(0, -gridSize);
            if (e.key === "ArrowRight" || e.key === "d" || e.key === "D") triggerDirection(gridSize, 0);
            if (e.key === "ArrowDown" || e.key === "s" || e.key === "S") triggerDirection(0, gridSize);
        });

        // Kontrol Sentuh D-Pad Mini
        const bindControl = (elementId, x, y) => {
            const btn = document.getElementById(elementId);
            btn.addEventListener("touchstart", (e) => { e.preventDefault(); triggerDirection(x, y); });
            btn.addEventListener("mousedown", (e) => { e.preventDefault(); triggerDirection(x, y); });
        };

        bindControl("btn-up", 0, -gridSize);
        bindControl("btn-down", 0, gridSize);
        bindControl("btn-left", -gridSize, 0);
        bindControl("btn-right", gridSize, 0);

        startBtn.addEventListener("click", startGame);

        function startGame() {
            snake = [
                { x: gridSize * 5, y: gridSize * 10 },
                { x: gridSize * 4, y: gridSize * 10 },
                { x: gridSize * 3, y: gridSize * 10 }
            ];
            dx = gridSize;
            dy = 0;
            score = 0;
            scoreElement.innerText = score;
            overlay.classList.add("hidden");
            resetFood();
            gameRunning = true;
            clearInterval(gameInterval);
            gameInterval = setInterval(update, 130); 
        }

        function triggerDirection(newDx, newDy) {
            if ((newDx === -gridSize && dx === gridSize) ||
                (newDx === gridSize && dx === -gridSize) ||
                (newDy === -gridSize && dy === gridSize) ||
                (newDy === gridSize && dy === -gridSize)) {
                return;
            }
            dx = newDx;
            dy = newDy;
        }

        function update() {
            if (!gameRunning) return;

            if (checkGameOver()) {
                endGame();
                return;
            }

            const head = { x: snake[0].x + dx, y: snake[0].y + dy };
            snake.unshift(head);

            if (snake[0].x === food.x && snake[0].y === food.y) {
                score += 10;
                scoreElement.innerText = score;
                if (score > highScore) {
                    highScore = score;
                    highScoreElement.innerText = highScore;
                    localStorage.setItem("fixedSnakeHighScore", highScore);
                }
                resetFood();
            } else {
                snake.pop(); 
            }

            draw();
        }

        function draw() {
            ctx.fillStyle = "#faf7f2"; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Makanan Pastel Mochi
            ctx.fillStyle = "#f3a1a3"; 
            ctx.beginPath();
            ctx.arc(food.x + gridSize/2, food.y + gridSize/2, gridSize/2 - 2, 0, Math.PI * 2);
            ctx.fill();

            // Ular Bulat Lembut
            snake.forEach((part, index) => {
                ctx.fillStyle = index === 0 ? adjustColor(snakeColor, 15) : snakeColor;
                ctx.strokeStyle = "#faf7f2";
                ctx.lineWidth = 1.5;
                
                ctx.beginPath();
                ctx.roundRect(part.x, part.y, gridSize, gridSize, [5]);
                ctx.fill();
                ctx.stroke();
            });
        }

        function resetFood() {
            const maxTilesX = canvas.width / gridSize;
            const maxTilesY = canvas.height / gridSize;
            food.x = Math.floor(Math.random() * maxTilesX) * gridSize;
            food.y = Math.floor(Math.random() * maxTilesY) * gridSize;

            for (let i = 0; i < snake.length; i++) {
                if (snake[i].x === food.x && snake[i].y === food.y) {
                    resetFood();
                    break;
                }
            }
        }

        function checkGameOver() {
            if (snake[0].x < 0 || snake[0].x >= canvas.width || snake[0].y < 0 || snake[0].y >= canvas.height) return true;
            for (let i = 1; i < snake.length; i++) {
                if (snake[0].x === snake[i].x && snake[0].y === snake[i].y) return true;
            }
            return false;
        }

        function endGame() {
            gameRunning = false;
            clearInterval(gameInterval);
            overlayTitle.innerText = "Game Over";
            startBtn.innerText = "Coba Lagi";
            overlay.classList.remove("hidden");
        }

        function adjustColor(hex, percent) {
            let R = parseInt(hex.substring(1, 3), 16);
            let G = parseInt(hex.substring(3, 5), 16);
            let B = parseInt(hex.substring(5, 7), 16);
            R = parseInt((R * (100 - percent)) / 100);
            G = parseInt((G * (100 - percent)) / 100);
            B = parseInt((B * (100 - percent)) / 100);
            return `rgb(${R}, ${G}, ${B})`;
        }

        draw();
    </script>
</body>
</html>
